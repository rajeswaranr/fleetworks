<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FleetWorks">
  <defs>
    <linearGradient id="fwTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d3358"/>
      <stop offset="0.55" stop-color="#132444"/>
      <stop offset="1" stop-color="#0b1626"/>
    </linearGradient>
    <linearGradient id="fwAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc964"/>
      <stop offset="1" stop-color="#e6920f"/>
    </linearGradient>
    <linearGradient id="fwSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- squircle tile -->
  <rect x="3" y="3" width="90" height="90" rx="26" fill="url(#fwTile)"/>
  <rect x="3" y="3" width="90" height="52" rx="26" fill="url(#fwSheen)"/>
  <rect x="3.75" y="3.75" width="88.5" height="88.5" rx="25.25" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <!-- two horizontal bars: the vehicle body -->
  <path d="M22 35 H56 M22 44 H56" stroke="#eaf1fb" stroke-opacity="0.92" stroke-width="4.5" stroke-linecap="round"/>
  <!-- two spaced tyre curves -->
  <path d="M25 57 a5 5 0 0 1 10 0 M46 57 a5 5 0 0 1 10 0" fill="none" stroke="url(#fwAmber)" stroke-width="4" stroke-linecap="round"/>
  <!-- two forward arrows: momentum -->
  <path d="M61 37 L69 46 L61 55" fill="none" stroke="url(#fwAmber)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M71 37 L79 46 L71 55" fill="none" stroke="url(#fwAmber)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI spark -->
  <path d="M74 15 l1.5 4.1 4.1 1.5 -4.1 1.5 -1.5 4.1 -1.5 -4.1 -4.1 -1.5 4.1 -1.5 z" fill="url(#fwAmber)"/>
</svg>
