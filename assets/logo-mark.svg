<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FleetWorks">
  <defs>
    <linearGradient id="fwTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d3358"/>
      <stop offset="0.55" stop-color="#132444"/>
      <stop offset="1" stop-color="#0b1626"/>
    </linearGradient>
    <linearGradient id="fwAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc964"/>
      <stop offset="1" stop-color="#e6920f"/>
    </linearGradient>
    <linearGradient id="fwSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- squircle tile -->
  <rect x="3" y="3" width="90" height="90" rx="26" fill="url(#fwTile)"/>
  <rect x="3" y="3" width="90" height="52" rx="26" fill="url(#fwSheen)"/>
  <rect x="3.75" y="3.75" width="88.5" height="88.5" rx="25.25" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <!-- three horizontal bars: motion / load -->
  <path d="M24 37 H45 M24 48 H45 M24 59 H45" stroke="#eaf1fb" stroke-opacity="0.92" stroke-width="6" stroke-linecap="round"/>
  <!-- two forward arrows: momentum -->
  <path d="M52 37 L61 48 L52 59" fill="none" stroke="url(#fwAmber)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M63 37 L72 48 L63 59" fill="none" stroke="url(#fwAmber)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI spark -->
  <path d="M72 18 l1.7 4.6 4.6 1.7 -4.6 1.7 -1.7 4.6 -1.7 -4.6 -4.6 -1.7 4.6 -1.7 z" fill="url(#fwAmber)"/>
</svg>
