<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FleetWorks logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16294a"/>
      <stop offset="1" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8b545"/>
      <stop offset="1" stop-color="#e69910"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- Learning signal: nodes rising from the cab -->
  <g fill="none" stroke="#39588b" stroke-width="6" stroke-linecap="round">
    <path d="M352 228 C 360 186 380 162 408 148"/>
    <path d="M340 222 C 332 178 310 152 282 132"/>
    <path d="M292 128 C 316 108 340 100 362 98"/>
  </g>
  <circle cx="414" cy="144" r="15" fill="#f5a623"/>
  <circle cx="278" cy="128" r="12" fill="#ffffff" opacity="0.92"/>
  <circle cx="368" cy="97" r="9" fill="#f5a623" opacity="0.85"/>

  <!-- Cargo body -->
  <rect x="82" y="196" width="214" height="128" rx="18" fill="url(#amber)"/>
  <!-- Body detail lines -->
  <line x1="118" y1="216" x2="118" y2="304" stroke="#c47f08" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <line x1="260" y1="216" x2="260" y2="304" stroke="#c47f08" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- Cab -->
  <path d="M312 240 h58 a18 18 0 0 1 14 7 l32 40 a18 18 0 0 1 4 11 v14 a12 12 0 0 1 -12 12 h-96 z" fill="url(#amber)"/>
  <!-- Window -->
  <path d="M326 252 h40 a10 10 0 0 1 8 4 l22 28 h-70 z" fill="#0f1e33"/>
  <!-- Headlight -->
  <rect x="404" y="296" width="14" height="16" rx="5" fill="#ffffff" opacity="0.95"/>

  <!-- Road -->
  <line x1="72" y1="392" x2="440" y2="392" stroke="#31518a" stroke-width="9" stroke-linecap="round" opacity="0.85"/>

  <!-- Wheels -->
  <g>
    <circle cx="146" cy="352" r="35" fill="#ffffff"/><circle cx="146" cy="352" r="15" fill="#0f1e33"/>
    <circle cx="232" cy="352" r="35" fill="#ffffff"/><circle cx="232" cy="352" r="15" fill="#0f1e33"/>
    <circle cx="372" cy="352" r="35" fill="#ffffff"/><circle cx="372" cy="352" r="15" fill="#0f1e33"/>
  </g>
</svg>
